# Build, sign, notarize, and publish Connector Control.dmg on version tags.
#
# Required repository secrets (same names as the trailcache repo):
#   APPLE_CERTIFICATE          base64-encoded Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD password for the .p12
#   APPLE_SIGNING_IDENTITY     e.g. "Developer ID Application: David LaPorte (TEAMID)"
#   APPLE_ID                   Apple ID email used for notarization
#   APPLE_PASSWORD             app-specific password for that Apple ID
#   APPLE_TEAM_ID              10-character team identifier
#   KEYCHAIN_PASSWORD          any string; protects the throwaway CI keychain

name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  release:
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Interpolated once here rather than inside run: blocks (injection hygiene).
      TAG: ${{ github.ref_name }}
      RUN_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import certificate.p12 -k $KEYCHAIN_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          rm certificate.p12

      - name: Build and sign
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/build.keychain-db
          VERSION="${TAG#v}" BUILD_NUMBER="$RUN_NUMBER" \
            UNIVERSAL=1 SIGNING_IDENTITY="$APPLE_SIGNING_IDENTITY" \
            ./scripts/build-app.sh

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "build/Connector Control.app" notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "build/Connector Control.app"
          spctl --assess --type execute --verbose=2 "build/Connector Control.app"

      - name: Package and notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          VERSION="${TAG#v}"
          ./scripts/make-dmg.sh "ConnectorControl_${VERSION}.dmg"
          # Sign and notarize the DMG too, so Gatekeeper trusts the download
          # end-to-end (hdiutil does not sign what it creates).
          codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" \
            "ConnectorControl_${VERSION}.dmg"
          xcrun notarytool submit "ConnectorControl_${VERSION}.dmg" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "ConnectorControl_${VERSION}.dmg"

      - name: Create GitHub Release
        run: |
          VERSION="${TAG#v}"
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" --title "Connector Control $VERSION" --generate-notes
          fi
          gh release upload "$TAG" "ConnectorControl_${VERSION}.dmg" --clobber
